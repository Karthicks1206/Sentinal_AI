# Sentinel AI - Configuration File
# Production-ready distributed self-healing IoT infrastructure

system:
  name: "Sentinel AI"
  version: "1.0.0"
  device_id: "${DEVICE_ID:-raspberry-pi-001}"
  environment: "${ENVIRONMENT:-production}"
  log_level: "${LOG_LEVEL:-INFO}"

monitoring:
  enabled: true
  # Health check intervals (seconds)
  collection_interval: 5
  health_check_interval: 10

  # Metrics to collect
  metrics:
    cpu:
      enabled: true
      # NOTE: threshold_percent is DISPLAY-ONLY — the anomaly detection agent
      # no longer uses any hardcoded threshold. All detection bounds are learned
      # from the live data stream via AdaptiveMetricBaseline (IQR + z-score).
      threshold_percent: 80
    memory:
      enabled: true
      threshold_percent: 85
    disk:
      enabled: true
      threshold_percent: 90
    network:
      enabled: true
      max_packet_loss_percent: 5
      ping_hosts:
        - "8.8.8.8"
        - "1.1.1.1"
    mqtt:
      enabled: false   # disabled on macOS dev — enable on real IoT hardware
      broker_host: "${MQTT_BROKER:-localhost}"
      broker_port: 1883
      timeout_seconds: 10
    sensors:
      enabled: false   # disabled on macOS dev — enable on real IoT hardware
      max_latency_ms: 1000
    power:
      enabled: true
      nominal_voltage_v: 5.0       # Nominal input voltage (5 V for RPi, 12/24 V for industrial)
      voltage_tolerance_pct: 10     # Alert when deviation exceeds 10 % of nominal
      max_current_a: 3.0            # Max acceptable current draw (A)
      max_watts: 15.0               # Max acceptable power consumption (W)

anomaly_detection:
  enabled: true

  # ── Adaptive detection — no hardcoded thresholds ───────────────────────
  # All detection bounds are computed at runtime from the live data stream.
  # Methods: IQR outlier, adaptive z-score, trend elevation, rate-of-change.

  # Persistence: metric must be anomalous for this many consecutive readings
  # before an alert fires.  At 5s collection interval, 2 readings = 10s.
  min_consecutive_readings: 2

  # Cooldown: once an anomaly fires for a metric, suppress re-fires for N min.
  cooldown_minutes: 1  # demo: 1 min cooldown (was 5 min)

  # Statistical method tuning (all bounds still derive from learned data)
  methods:
    z_score:
      enabled: true
      threshold: 2.5        # base z-score threshold; auto-increases for volatile metrics
      window_size: 100
    spike_detection:
      enabled: true         # rate-of-change spike — multiplier learned from data
    iqr_outlier:
      enabled: true         # Tukey-fence IQR — all bounds from percentiles of live data
    trend_elevation:
      enabled: true         # sustained elevation above mean+1.5σ for 5 consecutive readings
    threshold:
      enabled: true         # Hard floor — fires even if baseline is contaminated by stress tests
      cpu_percent: 80
      memory_percent: 85
      disk_percent: 90
      swap_percent: 70

  # Machine Learning
  ml:
    enabled: true
    model: "isolation_forest"
    contamination: 0.1
    retrain_interval_hours: 24
    min_samples_for_training: 50

  # Rolling baseline window per metric (number of readings)
  # Reduced to 60 readings (5 minutes) so stress-test data flushes quickly
  baseline:
    window_size: 60
    update_interval_minutes: 15

diagnosis:
  enabled: true

  # Rule-based diagnosis
  rules:
    enabled: true
    config_path: "config/diagnosis_rules.yaml"

  # LLM-powered diagnosis (Bedrock disabled — Ollama handles AI diagnosis)
  llm:
    enabled: false
    provider: "aws_bedrock"
    model_id: "anthropic.claude-3-sonnet-20240229-v1:0"
    region: "${AWS_REGION:-us-east-1}"
    max_tokens: 2048
    temperature: 0.3
    timeout_seconds: 30

    # Context window for analysis
    log_context_lines: 100
    metric_history_minutes: 30

recovery:
  enabled: true

  # Automatic recovery settings
  auto_recovery: true
  max_retries: 3
  retry_delay_seconds: 5
  cooldown_period_seconds: 300

  # Graduated escalation: window (minutes) for counting repeated incidents
  escalation_window_minutes: 30

  # Available recovery actions
  # Any action not listed here is enabled by default (enabled: true).
  actions:
    # ── Original actions ────────────────────────────────────────────────
    restart_mqtt:
      enabled: true
      command: "sudo systemctl restart mosquitto"
      timeout_seconds: 30
    kill_process:
      enabled: true
      max_memory_mb: 500
      timeout_seconds: 10
    reconnect_sensor:
      enabled: true
      timeout_seconds: 20
    failover:
      enabled: true
      backup_broker: "${BACKUP_MQTT_BROKER:-}"
    clear_cache:
      enabled: true
      paths:
        - "/tmp/sentinel_cache"
        - "/var/cache/sentinel"
    restart_service:
      enabled: true
      services:
        - "sentinel-agent"
    # ── New full-scale actions ───────────────────────────────────────────
    throttle_cpu_process:
      enabled: true        # renice highest-CPU process to +10 (non-destructive)
    kill_top_cpu_process:
      enabled: true        # terminate highest-CPU process (escalation level 3+)
    kill_top_memory_process:
      enabled: true        # terminate highest-memory process (escalation level 3+)
    compact_memory:
      enabled: true        # drop OS page cache (purge / drop_caches)
    emergency_disk_cleanup:
      enabled: true        # delete old /tmp files + compress rotated logs
    reset_network_interface:
      enabled: true        # bring NIC down/up (network anomalies)
    flush_dns:
      enabled: true        # flush OS DNS resolver cache
    rotate_logs:
      enabled: true        # compress + delete old log files
    restart_process_by_name:
      enabled: false       # set to true + configure below if needed
      process_name: ""     # e.g. "nginx"
      restart_command: ""  # e.g. "nginx"

# Multi-device monitoring — hub accepts metric pushes from sentinel_client.py
multi_device:
  enabled: true
  # Devices pushing metrics to this hub are automatically registered.
  # Run on remote machines:
  #   python sentinel_client.py --hub http://<this-hub-ip>:5001 --device my-device

learning:
  enabled: true

  # Local persistence
  local_db:
    path: "data/sentinel.db"
    backup_interval_hours: 24
    retention_days: 90

  # AWS sync
  aws_sync:
    enabled: true
    dynamodb:
      table_name: "${DYNAMODB_TABLE:-sentinel-incidents}"
      region: "${AWS_REGION:-us-east-1}"
    s3:
      bucket_name: "${S3_BUCKET:-sentinel-logs}"
      prefix: "incidents/"
      region: "${AWS_REGION:-us-east-1}"
    sync_interval_minutes: 15

  # Adaptive learning
  adaptation:
    enabled: true
    threshold_adjustment: true
    strategy_refinement: true
    min_incidents_for_learning: 10

event_bus:
  type: "in_memory"  # Options: in_memory, redis, kafka
  buffer_size: 10000
  max_retries: 3

  # Event types
  events:
    - "health.metric"
    - "anomaly.detected"
    - "diagnosis.complete"
    - "recovery.action"
    - "learning.updated"

aws:
  enabled: true
  region: "${AWS_REGION:-us-east-1}"

  # AWS IoT Core
  iot_core:
    enabled: true
    endpoint: "${IOT_ENDPOINT}"
    cert_path: "certs/device.cert.pem"
    key_path: "certs/device.private.key"
    ca_path: "certs/root-CA.crt"
    thing_name: "${THING_NAME:-sentinel-device-001}"

    # MQTT topics
    topics:
      telemetry: "sentinel/telemetry/{device_id}"
      anomalies: "sentinel/anomalies/{device_id}"
      recovery: "sentinel/recovery/{device_id}"
      policy: "sentinel/policy/{device_id}"

  # CloudWatch
  cloudwatch:
    enabled: true
    namespace: "SentinelAI"
    log_group: "/sentinel/edge-devices"
    metric_buffer_size: 100

  # Lambda
  lambda:
    orchestrator_function: "sentinel-orchestrator"
    region: "${AWS_REGION:-us-east-1}"

groq:
  enabled: true
  model: "llama-3.3-70b-versatile"  # best free-tier Groq model — strong reasoning for diagnosis
  max_tokens: 1024
  temperature: 0.2
  # API key read from GROQ_API_KEY env var or .env file

ollama:
  enabled: true
  model: "llama3.2:3b"   # local fallback — used when Groq is unavailable
  temperature: 0.2
  num_predict: 512

openai:
  enabled: false          # disabled — no billing credits; Ollama is used instead
  model: "gpt-4o"
  max_tokens: 2048
  temperature: 0.3
  timeout_seconds: 30
  # API key is read from the OPENAI_API_KEY environment variable

simulation:
  enabled: true

  scenarios:
    memory_spike:
      enabled: true
      trigger_percent: 90
      duration_seconds: 60
    mqtt_drop:
      enabled: true
      duration_seconds: 30
    latency_increase:
      enabled: true
      multiplier: 5
      duration_seconds: 45
    sensor_failure:
      enabled: true
      failure_rate: 0.1
    cpu_overload:
      enabled: true
      target_percent: 95
      duration_seconds: 120

database:
  backend: "postgres"                        # "postgres" | "sqlite"
  postgres:
    host:     "${PG_HOST:-localhost}"
    port:     5432
    dbname:   "${PG_DBNAME:-sentinel_ai}"
    user:     "${PG_USER:-sentinel_user}"
    password: "${PG_PASSWORD:-sentinel_pass}"
    pool_min: 2
    pool_max: 20
  sqlite:
    path: "data/sentinel.db"                 # fallback only

security:
  enabled: true
  scan_interval_seconds: 30      # How often to run threat checks
  demo_mode: true                # Inject synthetic threats for demo visibility
  allowlist_ports: [22, 80, 443, 1883, 5001, 8883]  # Expected listening ports
  claude:
    model: "claude-opus-4-6"     # Claude model for AI-powered threat analysis
    # Fail-open: if Claude is down or key missing, threats are published as-is
    # Fail-SAFE on suppression: Claude must explicitly say genuine=false to suppress

logging:
  level: "${LOG_LEVEL:-INFO}"
  format: "json"

  handlers:
    console:
      enabled: true
      level: "INFO"
    file:
      enabled: true
      level: "DEBUG"
      path: "logs/sentinel.log"
      max_bytes: 104857600  # 100MB
      backup_count: 10
    cloudwatch:
      enabled: true
      level: "WARNING"
      batch_size: 100
