# Mosquitto MQTT Broker Configuration for Sentinel AI

# Network
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Security
allow_anonymous true

# Performance
max_connections 1000
max_queued_messages 10000

# Timeouts
keepalive_interval 60

# Memory management
memory_limit 0
